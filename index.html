<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLM | Birthday & Anniversary Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div class="background-glow"></div>

    <div class="container">
        <div class="glass-card">
            <div class="logo-container">
                <div class="church-logo-circle">
                    <img src="https://i.ibb.co/YTLXhdWY/1759316149196.png" alt="WLM Logo" class="main-logo">
                </div>
            </div>

            <h2 class="main-title">WORSHIPLIFE FAMILY</h2>
            <p class="sub-title">OFFICIAL REGISTRY</p>

            <div class="form-content">
                <div class="input-box">
                    <span class="label">FULL NAME</span>
                    <input type="text" placeholder="Enter name..." id="userName">
                </div>

                <div class="birthday-row">
                    <div class="input-box small">
                        <span class="label">DAY</span>
                        <input type="number" placeholder="DD" id="birthDay" min="1" max="31">
                    </div>
                    <div class="input-box large">
                        <span class="label">MONTH</span>
                        <select id="birthMonth">
                            <option value="" disabled selected>Month</option>
                            <option>January</option><option>February</option><option>March</option>
                            <option>April</option><option>May</option><option>June</option>
                            <option>July</option><option>August</option><option>September</option>
                            <option>October</option><option>November</option><option>December</option>
                        </select>
                    </div>
                </div>

                <div class="input-box">
                    <span class="label">WEDDING ANNIVERSARY <small>(OPTIONAL)</small></span>
                    <input type="text" placeholder="e.g. 15th June" id="anniversaryDate">
                </div>

                <button class="premium-button" onclick="testSubmit()">
                    <div class="btn-shine"></div>
                    <span>SECURE REGISTER</span>
                </button>
                
                <div id="feedback" class="feedback-msg"></div>
            </div>

            <footer class="designer-credit">
                ENGINEERED BY <a href="https://github.com/chekwas329-beep" target="_blank" class="portfolio-link">CHEKWAS</a>
            </footer>
        </div>
    </div>

    <audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
